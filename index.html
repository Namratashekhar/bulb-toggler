<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb-Toggler</title>
    <style>
        body{
            background-color: rgb(252, 208, 172);
            height: 500px;
        }

        .heading {
            color: rgb(241, 51, 108);
            text-align: center;
        }

        .bulb-container{
            width: fit-content;
            border: 1px solid black;
            margin: 30px auto;
            padding: 25px;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 0 20px gray;
        }
    </style>
</head>

<body>
    <h1 class="heading">Bulb Toggler</h1>
    <div class="bulb-container">
        <img src="off-bulb.png" class="img-bulb" id="bulb">

        <div class="btn-container">
            <button class="btn btn-off" onclick="bulbOff()">Off</button>
            <button class=" btn btn-on" onclick="bulbOn()"> On</button>
        </div>
    </div>

    <script>
        const bulbElement = document.getElementById("bulb");

        function bulbOn() {
            
            bulbElement.src = "on-bulb.png";
        }

        function bulbOff() {
            bulbElement.src = "off-bulb.png";
        }
    </script>
</body>

</html>
