<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb-Toggler</title>
</head>

<body>
    <h1 class="heading">Bulb Toggler</h1>
    <div class="bulb-container">
        <img src="off-bulb.png" class="img-bulb" id="bulb">

        <div class="btn-container">
            <button class="btn btn-off" onclick="bulbOff()">Off</button>
            <button class=" btn btn-on" onclick="bulbOn()"> On</button>
        </div>
    </div>

</body>

</html>
